footprint: [[0.30, 0.24], [0.30, -0.24], [-0.26, -0.24], [-0.26, 0.24]]
footprint_padding: 0.03

transform_tolerance: 1.0
map_type: costmap

obstacle_layer:
  enabled: true
  obstacle_range: 5.5
  raytrace_range: 6.0
  track_unknown_space: true
  combination_method: 1
  observation_sources: laser_scan_sensor
  laser_scan_sensor:
    sensor_frame: laser_link
    data_type: LaserScan
    topic: /scan
    marking: true
    clearing: true
    expected_update_rate: 0.2
    inf_is_valid: true

inflation_layer:
  enabled: true
  inflation_radius: 0.48
  cost_scaling_factor: 3.2

static_layer:
  enabled: true
  map_topic: /map
  subscribe_to_updates: true
  track_unknown_space: true
